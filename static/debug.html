<!DOCTYPE html>
<html>
<head><title>Neve AI Debug</title>
<style>body{font-family:monospace;background:#111;color:#0f0;padding:20px;margin:0}
.ok{color:#0f0}.err{color:red}.warn{color:yellow}pre{white-space:pre-wrap}
#log{max-height:50vh;overflow:auto}
iframe{width:100%;height:40vh;border:2px solid #333}
</style></head>
<body>
<h2>Neve AI - Frontend Debug (iframe mode)</h2>
<div id="log"></div>
<hr>
<h3>App iframe below:</h3>
<iframe id="app-frame" src="/"></iframe>
<script>
const log = (msg, cls='ok') => {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = `[${new Date().toISOString().split('T')[1]}] ${msg}`;
  document.getElementById('log').appendChild(d);
};

log('Waiting for app to load in iframe...');

// Check iframe for errors at intervals
let checkCount = 0;
const checker = setInterval(() => {
  checkCount++;
  try {
    const iframe = document.getElementById('app-frame');
    const iframeWin = iframe.contentWindow;
    
    if (iframeWin && iframeWin.__JS_ERRORS) {
      const errors = iframeWin.__JS_ERRORS;
      if (errors.length > 0) {
        log('=== FOUND ' + errors.length + ' JS ERRORS ===', 'err');
        errors.forEach((e, i) => {
          log('Error #' + (i+1) + ': [' + e.type + '] ' + e.msg, 'err');
          if (e.file) log('  File: ' + e.file + ':' + e.line + ':' + e.col, 'err');
          if (e.stack) log('  Stack: ' + e.stack, 'err');
        });
      } else {
        log('No JS errors captured (' + checkCount + ')');
      }
    } else {
      log('iframe not accessible yet or __JS_ERRORS not defined (' + checkCount + ')', 'warn');
    }

    // Check DOM state
    if (iframeWin && iframeWin.document) {
      const doc = iframeWin.document;
      const splash = doc.getElementById('splash-screen');
      const debugStatus = doc.getElementById('debug-status');
      const appDiv = doc.querySelector('.app');
      const spinner = doc.querySelector('.spinner_ajPY');
      
      log('DOM: splash=' + (splash ? 'EXISTS' : 'removed') + 
          ', debug-status=' + (debugStatus ? debugStatus.textContent : 'N/A') +
          ', .app=' + (appDiv ? 'EXISTS' : 'N/A') +
          ', spinner=' + (spinner ? 'EXISTS' : 'N/A'));
    }
  } catch(e) {
    log('Error checking iframe: ' + e.message, 'warn');
  }
  
  if (checkCount >= 30) {
    clearInterval(checker);
    log('=== Debug check complete (30 checks) ===');
  }
}, 2000);
</script>
</body>
</html>
